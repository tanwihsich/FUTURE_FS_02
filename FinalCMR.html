const Store = {
  _get(key) { try { return JSON.parse(localStorage.getItem('lf_' + key)) || null; } catch { return null; } },
  _set(key, val) { localStorage.setItem('lf_' + key, JSON.stringify(val)); },
  init() { if (!this._get('initialized')) { this._set('users', [SEED_USER]); this._set('leads', SEED_LEADS); this._set('followups', SEED_FOLLOWUPS); this._set('initialized', true); } },
  getUsers() { return this._get('users') || []; },
  findUser(email) { return this.getUsers().find(u => u.email === email); },
  getLeads() { return this._get('leads') || []; },
  getLead(id) { return this.getLeads().find(l => l.id === id); },
  addLead(lead) { const leads = this.getLeads(); lead.id = 'l' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); lead.createdAt = new Date().toISOString(); lead.updatedAt = lead.createdAt; leads.unshift(lead); this._set('leads', leads); return lead; },
  updateLead(id, data) { const leads = this.getLeads(); const idx = leads.findIndex(l => l.id === id); if (idx === -1) return null; leads[idx] = { ...leads[idx], ...data, updatedAt: new Date().toISOString() }; this._set('leads', leads); return leads[idx]; },
  deleteLead(id) { let leads = this.getLeads(); leads = leads.filter(l => l.id !== id); this._set('leads', leads); let followups = this.getFollowups(); followups = followups.filter(f => f.leadId !== id); this._set('followups', followups); },
  getFollowups() { return this._get('followups') || []; },
  getFollowupsByLead(leadId) { return this.getFollowups().filter(f => f.leadId === leadId); },
  addFollowup(followup) { const followups = this.getFollowups(); followup.id = 'f' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); followup.completed = false; followup.createdAt = new Date().toISOString(); followups.unshift(followup); this._set('followups', followups); return followup; },
  toggleFollowup(id) { const followups = this.getFollowups(); const idx = followups.findIndex(f => f.id === id); if (idx === -1) return null; followups[idx].completed = !followups[idx].completed; this._set('followups', followups); return followups[idx]; },
  deleteFollowup(id) { let followups = this.getFollowups(); followups = followups.filter(f => f.id !== id); this._set('followups', followups); }

  login(email, password) { const user = Store.findUser(email); if (!user) return { ok: false, error: 'No account found with this email.' }; if (user.password !== password) return { ok: false, error: 'Incorrect password. Please try again.' }; const token = btoa(JSON.stringify({ id: user.id, name: user.name, email: user.email, role: user.role })); this.setToken(token); return { ok: true, user }; },

function formatDate(isoStr) { if (!isoStr) return '—'; const d = new Date(isoStr); return d.toLocaleDateString('en-IN', { month: 'short', day: 'numeric', year: 'numeric' }); }
function formatDateTime(isoStr) { if (!isoStr) return '—'; const d = new Date(isoStr); return d.toLocaleDateString('en-IN', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' }); }
function relativeTime(isoStr) { if (!isoStr) return ''; const now = Date.now(); const then = new Date(isoStr).getTime(); const diff = now - then; const mins = Math.floor(diff / 60000); if (mins < 1) return 'Just now'; if (mins < 60) return mins + 'm ago'; const hrs = Math.floor(mins / 60); if (hrs < 24) return hrs + 'h ago'; const days = Math.floor(hrs / 24); if (days < 7) return days + 'd ago'; if (days < 30) return Math.floor(days / 7) + 'w ago'; return Math.floor(days / 30) + 'mo ago'; }
function escapeHtml(str) { if (!str) return ''; const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
function statusBadge(status) { const c = STATUS_COLORS[status] || STATUS_COLORS.New; return `<span class="badge" style="background:${c.bg};color:${c.text}"><span class="pulse-dot inline-block mr-1.5" style="background:${c.dot};color:${c.dot}"></span>${status}</span>`; }
function sourceIcon(source) { const icons = { Website:'fa-globe', Referral:'fa-handshake', 'Social Media':'fa-hashtag', Advertisement:'fa-bullhorn', Other:'fa-ellipsis' }; return `<i class="fa-solid ${icons[source] || 'fa-circle'} text-slate-400 mr-1.5"></i>${source}`; }

e-block">${escapeHtml(lead.company)} &middot; ${statusBadge(lead.status)}</span>` : ''}</div><button onclick="confirmDeleteFollowup('${f.id}')" class="text-slate-300 hover:text-red-500 transition shrink-0 mt-1"><i class="fa-solid fa-trash text-xs"></i></button></div></div>`; }).join('')}</div>`}</div>${completed.length > 0 ? `<div class="bg-white rounded-2xl border border-slate-200 overflow-hidden"><div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between"><h3 class="font-700 text-slate-800">Completed</h3><span class="text-xs text-slate-400">${completed.length} total</span></div><div class="divide-y divide-slate-50">${completed.slice(0, 10).map(f => { const lead = Store.getLead(f.leadId); return `<div class="px-6 py-3 hover:bg-slate-50 transition opacity-60"><div class="flex items-start gap-4"><button onclick="toggleFollowupStatus('${f.id}')" class="mt-0.5 w-5 h-5 rounded-full bg-brand-500 border-2 border-brand-500 flex items-center justify-center shrink-0 transition" title="Mark incomplete"><i class="fa-solid fa-check text-white text-[10px]"></i></button><div class="flex-1 min-w-0"><p class="text-sm text-slate-600 line-through">${escapeHtml(f.note)}</p><span class="text-xs text-slate-400 mt-1 inline-block">${lead ? escapeHtml(lead.name) : 'Unknown'} &middot; Completed ${relativeTime(f.createdAt)}</span></div></div></div>`; }).join('')}</div></div>` : ''}</div>`;

// ========== Analytics Page ==========
let analyticsCharts = [];
function renderAnalytics() {
  const leads = Store.getLeads(); const total = leads.length; const converted = leads.filter(l => l.status === 'Converted').length; const lost = leads.filter(l => l.status === 'Lost').length; const convRate = total > 0 ? ((converted / total) * 100).toFixed(1) : '0.0'; const lossRate = total > 0 ? ((lost / total) * 100).toFixed(1) : '0.0';
  document.getElementById('content').innerHTML = `<div class="page-enter"><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8"><div class="bg-white rounded-2xl border border-slate-200 p-5 text-center"><p class="text-sm text-slate-500 mb-1">Total Leads</p><p class="text-4xl font-800 text-slate-800">${total}</p></div><div class="bg-white rounded-2xl border border-slate-200 p-5 text-center"><p class="text-sm text-slate-500 mb-1">Conversion Rate</p><p class="text-4xl font-800 text-brand-600">${convRate}%</p></div><div class="bg-white rounded-2xl border border-slate-200 p-5 text-center"><p class="text-sm text-slate-500 mb-1">Loss Rate</p><p class="text-4xl font-800 text-red-500">${lossRate}%</p></div><div class="bg-white rounded-2xl border border-slate-200 p-5 text-center"><p class="text-sm text-slate-500 mb-1">Active Pipeline</p><p class="text-4xl font-800 text-violet-600">${leads.filter(l => ['New','Contacted','Qualified'].includes(l.status)).length}</p></div></div><div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6"><div class="bg-white rounded-2xl border border-slate-200 p-6"><h3 class="font-700 text-slate-800 mb-4">Leads by Status</h3><div class="h-72 flex items-center justify-center"><canvas id="analyticsStatusPie"></canvas></div></div><div class="bg-white rounded-2xl border border-slate-200 p-6"><h3 class="font-700 text-slate-800 mb-4">Leads by Source</h3><div class="h-72 flex items-center justify-center"><canvas id="analyticsSourceBar"></canvas></div></div></div><div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6"><div class="bg-white rounded-2xl border border-slate-200 p-6"><h3 class="font-700 text-slate-800 mb-4">Monthly Lead Growth</h3><div class="h-72"><canvas id="analyticsMonthlyBar"></canvas></div></div><div class="bg-white rounded-2xl border border-slate-200 p-6"><h3 class="font-700 text-slate-800 mb-4">Status Conversion Funnel</h3><div class="h-72"><canvas id="analyticsFunnel"></canvas></div></div></div><div class="bg-white rounded-2xl border border-slate-200 p-6"><h3 class="font-700 text-slate-800 mb-4">Status Breakdown</h3><div class="grid grid-cols-1 sm:grid-cols-5 gap-4">${STATUS_OPTIONS.map(s => { const count = leads.filter(l => l.status === s).length; const pct = total > 0 ? ((count / total) * 100).toFixed(1) : '0.0'; return `<div class="text-center p-4 rounded-xl" style="background:${STATUS_COLORS[s].bg}"><div class="w-3 h-3 rounded-full mx-auto mb-2" style="background:${STATUS_COLORS[s].dot}"></div><p class="text-2xl font-800" style="color:${STATUS_COLORS[s].text}">${count}</p><p class="text-xs font-600 mt-1" style="color:${STATUS_COLORS[s].text}">${s}</p><p class="text-xs mt-0.5" style="color:${STATUS_COLORS[s].text};opacity:0.7">${pct}%</p></div>`; }).join('')}</div></div></div>`;
  renderAnalyticsCharts(leads);
}
function renderAnalyticsCharts(leads) {
  analyticsCharts.forEach(c => c.destroy()); analyticsCharts = [];
  const statusCounts = {}; STATUS_OPTIONS.forEach(s => statusCounts[s] = 0); leads.forEach(l => { if (statusCounts[l.status] !== undefined) statusCounts[l.status]++; });
  const sourceCounts = {}; SOURCE_OPTIONS.forEach(s => sourceCounts[s] = 0); leads.forEach(l => { if (sourceCounts[l.source] !== undefined) sourceCounts[l.source]++; });
  const ctx1 = document.getElementById('analyticsStatusPie'); if (ctx1) { analyticsCharts.push(new Chart(ctx1, { type: 'doughnut', data: { labels: STATUS_OPTIONS, datasets: [{ data: STATUS_OPTIONS.map(s => statusCounts[s]), backgroundColor: STATUS_OPTIONS.map(s => STATUS_COLORS[s].dot), borderWidth: 0, hoverOffset: 8 }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '60%', plugins: { legend: { position: 'right', labels: { padding: 14, usePointStyle: true, pointStyle: 'circle', font: { size: 12, family: 'Plus Jakarta Sans' } } } } } })); }
  const ctx2 = document.getElementById('analyticsSourceBar'); if (ctx2) { analyticsCharts.push(new Chart(ctx2, { type: 'bar', data: { labels: SOURCE_OPTIONS, datasets: [{ label: 'Leads', data: SOURCE_OPTIONS.map(s => sourceCounts[s]), backgroundColor: CHART_COLORS.slice(0, SOURCE_OPTIONS.length), borderRadius: 8, borderSkipped: false, barThickness: 40 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 11, family: 'Plus Jakarta Sans' } }, grid: { color: '#F1F5F9' } }, x: { ticks: { font: { size: 11, family: 'Plus Jakarta Sans' } }, grid: { display: false } } } } })); }
  const monthlyData = {}; leads.forEach(l => { const d = new Date(l.createdAt); const key = d.toLocaleDateString('en-IN', { month: 'short', year: '2-digit' }); monthlyData[key] = (monthlyData[key] || 0) + 1; });
  const monthKeys = Object.keys(monthlyData).sort((a, b) => { const [am, ay] = a.split(' '); const [bm, by] = b.split(' '); return new Date(`01 ${am} 20${ay}`) - new Date(`01 ${bm} 20${by}`); });
  const ctx3 = document.getElementById('analyticsMonthlyBar'); if (ctx3) { analyticsCharts.push(new Chart(ctx3, { type: 'bar', data: { labels: monthKeys.length ? monthKeys : ['No Data'], datasets: [{ label: 'New Leads', data: monthKeys.length ? monthKeys.map(k => monthlyData[k]) : [0], backgroundColor: '#10B981', borderRadius: 8, borderSkipped: false, barThickness: 32 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 11, family: 'Plus Jakarta Sans' } }, grid: { color: '#F1F5F9' } }, x: { ticks: { font: { size: 11, family: 'Plus Jakarta Sans' } }, grid: { display: false } } } } })); }
  const funnelOrder = ['New', 'Contacted', 'Qualified', 'Converted'];
  const ctx4 = document.getElementById('analyticsFunnel'); if (ctx4) { analyticsCharts.push(new Chart(ctx4, { type: 'bar', data: { labels: funnelOrder, datasets: [{ label: 'Leads', data: funnelOrder.map(s => statusCounts[s]), backgroundColor: funnelOrder.map(s => STATUS_COLORS[s].dot), borderRadius: 6, borderSkipped: false }] }, options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 11, family: 'Plus Jakarta Sans' } }, grid: { color: '#F1F5F9' } }, y: { ticks: { font: { size: 12, family: 'Plus Jakarta Sans', weight: '600' } }, grid: { display: false } } } } })); }
}

function handleLeadSubmit(e, editId) {
  e.preventDefault(); const form = e.target; const data = { name: form.name.value.trim(), email: form.email.value.trim(), phone: form.phone.value.trim(), company: form.company.value.trim(), source: form.source.value, status: form.status.value, notes: form.notes.value.trim() };
  if (!data.name || !data.email) { showToast('Please fill in all required fields.', 'error'); return; }
  if (editId) { Store.updateLead(editId, data); showToast('Lead updated successfully!', 'success'); } else { Store.addLead(data); showToast('New lead added successfully!', 'success'); }
  closeModal(); renderPage();
}

// ============================================
// Modal: Add Follow-up
// ============================================
function showAddFollowupModal(leadId) {
  const lead = Store.getLead(leadId); if (!lead) return; const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1); const defaultDate = tomorrow.toISOString().split('T')[0];
  showModal(`<div class="p-6"><div class="flex items-center justify-between mb-6"><h3 class="text-lg font-700 text-slate-800">Schedule Follow-up</h3><button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 transition"><i class="fa-solid fa-xmark text-lg"></i></button></div><div class="mb-4 p-3 bg-slate-50 rounded-xl flex items-center gap-3"><div class="w-8 h-8 bg-brand-100 rounded-lg flex items-center justify-center text-brand-600 font-700 text-sm">${lead.name.charAt(0)}</div><div><p class="text-sm font-600 text-slate-800">${escapeHtml(lead.name)}</p><p class="text-xs text-slate-400">${escapeHtml(lead.company)}</p></div></div><form id="followupForm" class="space-y-4" onsubmit="handleFollowupSubmit(event, '${leadId}')"><div><label class="block text-sm font-600 text-slate-700 mb-1">Follow-up Date <span class="text-red-400">*</span></label><input type="date" name="followupDate" required value="${defaultDate}" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm transition"></div><div><label class="block text-sm font-600 text-slate-700 mb-1">Notes <span class="text-red-400">*</span></label><textarea name="note" rows="3" required placeholder="Describe the follow-up plan..." class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm transition resize-none"></textarea></div><div class="flex justify-end gap-3 pt-2"><button type="button" onclick="closeModal()" class="px-5 py-2.5 rounded-xl border border-slate-200 text-sm font-600 text-slate-600 hover:bg-slate-50 transition">Cancel</button><button type="submit" class="btn-primary px-5 py-2.5 rounded-xl bg-brand-500 hover:bg-brand-600 text-white text-sm font-600 transition">Schedule</button></div></form></div>`);
}
function handleFollowupSubmit(e, leadId) {
  e.preventDefault(); const form = e.target; const data = { leadId: leadId, note: form.note.value.trim(), followupDate: new Date(form.followupDate.value + 'T09:00:00Z').toISOString() };
  if (!data.note || !form.followupDate.value) { showToast('Please fill in all required fields.', 'error'); return; }
  Store.addFollowup(data); showToast('Follow-up scheduled successfully!', 'success'); closeModal(); renderPage();
}

// ============================================
// Action Functions
// ============================================
function updateLeadStatus(id, status) { Store.updateLead(id, { status }); showToast(`Status updated to ${status}`, 'success'); renderPage(); }
function toggleFollowupStatus(id) { const f = Store.toggleFollowup(id); if (f) { showToast(f.completed ? 'Follow-up marked as completed' : 'Follow-up marked as pending', 'success'); renderPage(); } }
function confirmDeleteLead(id) { const lead = Store.getLead(id); if (!lead) return; showConfirm('Delete Lead', `Are you sure you want to delete "${lead.name}"? All associated follow-ups will also be removed.`, () => { Store.deleteLead(id); showToast('Lead deleted successfully', 'success'); if (currentPage === 'lead') navigate('leads'); else renderPage(); }); }
function confirmDeleteFollowup(id) { showConfirm('Delete Follow-up', 'Are you sure you want to remove this follow-up?', () => { Store.deleteFollowup(id); showToast('Follow-up deleted', 'success'); renderPage(); }); }
function handleLogout() { Auth.logout(); showAppShell(false); showToast('Logged out successfully', 'info'); }

// ============================================
// Auth & Login Flow
// ============================================
function showAppShell(show) { document.getElementById('loginScreen').classList.toggle('hidden', show); document.getElementById('appShell').classList.toggle('hidden', !show); }
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault(); const email = document.getElementById('loginEmail').value.trim(); const password = document.getElementById('loginPassword').value; const errorEl = document.getElementById('loginError');
  if (!email || !password) { errorEl.textContent = 'Please enter both email and password.'; errorEl.classList.remove('hidden'); return; }
  const result = Auth.login(email, password);
  if (result.ok) { errorEl.classList.add('hidden'); showAppShell(true); initApp(); showToast(`Welcome back, ${result.user.name}!`, 'success'); } else { errorEl.textContent = result.error; errorEl.classList.remove('hidden'); }
});

// ============================================
// App Initialization
// ============================================
function initApp() {
  const user = Auth.getUser();
  if (user) { document.getElementById('userName').textContent = user.name; document.getElementById('userEmail').textContent = user.email; document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase(); }
  document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-IN', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
  if (!window.location.hash) window.location.hash = 'dashboard'; parseRoute();
}

Store.init();
if (Auth.isLoggedIn()) { showAppShell(true); initApp(); } else { showAppShell(false); }
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeModal(); closeConfirm(); } });
document.getElementById('modalOverlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal(); });
document.getElementById('confirmOverlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeConfirm(); });
</script>
</body>
</html>
